<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuestros proyectos — Ap-Ab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="proceso.css" />
</head>
<body class="proceso">
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar pr-top">
    <a class="brand" href="index.html">AP-AB</a>
    <a class="btn btn-ghost back" href="index.html">← Inicio</a>
  </header>

  <section class="gracias">
    <div class="gracias-hero">
      <h1 class="gracias-typed" id="graciasMsg" hidden></h1>
      <h1 class="gracias-default" id="graciasTitle">Nuestros<br />proyectos.</h1>
      <p class="gracias-sub">Esto es parte de lo que hemos construido en Ap-Ab. Desliza e interactúa con cada uno.</p>
      <span class="scroll-cue">↓ DESLIZA ↓</span>
    </div>

    <div class="gallery" id="galeria">
      <h2 class="gallery-title">Nuestros proyectos</h2>
      <div class="gallery-grid" id="galleryGrid"><!-- se llena con JS --></div>
    </div>
  </section>

  <!-- Overlay para jugar a pantalla completa -->
  <div class="play-overlay" id="playOverlay" hidden>
    <div class="play-bar">
      <span class="play-title" id="playTitle"></span>
      <button class="play-close" id="playClose" aria-label="Cerrar">✕ CERRAR</button>
    </div>
    <iframe class="play-frame" id="playFrame" title="Proyecto"
      allow="autoplay; fullscreen; gamepad; pointer-lock"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock"></iframe>
  </div>

  <script src="projects.js"></script>
  <script>
    // El mensaje de "gracias" (animado tipo terminal) solo si se llega desde el envío del correo
    if (new URLSearchParams(location.search).get("from") === "lead") {
      const title = document.getElementById("graciasTitle");
      const sub = document.querySelector(".gracias-sub");
      const msg = document.getElementById("graciasMsg");
      title.hidden = true;
      if (sub) sub.hidden = true;
      msg.hidden = false;

      const text = "> Nos pondremos en contacto contigo_";
      let i = 0;
      const caret = '<span class="caret">▋</span>';
      (function type() {
        msg.innerHTML = text.slice(0, i) + caret;
        if (i < text.length) { i++; setTimeout(type, 55); }
      })();
    }

    const grid = document.getElementById("galleryGrid");
    const projects = (window.PROJECTS || []);
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    if (!projects.length) {
      grid.innerHTML = '<div class="project-card empty">Próximamente: aquí podrás interactuar con nuestras apps.</div>';
    } else {
      grid.innerHTML = projects.map((p, i) => `
        <div class="project-card">
          <div class="project-poster" ${p.poster ? `style="background-image:url('${esc(p.poster)}')"` : ""}>
            <button class="project-play" data-i="${i}" aria-label="Jugar ${esc(p.nombre)}">▶ JUGAR</button>
          </div>
          <div class="project-body">
            <div class="project-head"><b>${esc(p.nombre || "Proyecto")}</b><span>${esc(p.tag || "")}</span></div>
            ${p.desc ? `<p class="project-desc">${esc(p.desc)}</p>` : ""}
          </div>
        </div>
      `).join("");

      const overlay = document.getElementById("playOverlay");
      const frame = document.getElementById("playFrame");
      const playTitle = document.getElementById("playTitle");

      function openPlay(p) {
        playTitle.textContent = p.nombre || "Proyecto";
        frame.src = p.url;
        overlay.hidden = false;
        document.body.style.overflow = "hidden";
        setTimeout(() => frame.focus(), 100);
      }
      function closePlay() {
        overlay.hidden = true;
        frame.src = "about:blank";
        document.body.style.overflow = "";
      }
      grid.querySelectorAll(".project-play").forEach(btn => {
        btn.addEventListener("click", () => openPlay(projects[+btn.dataset.i]));
      });
      document.getElementById("playClose").addEventListener("click", closePlay);
      document.addEventListener("keydown", e => { if (e.key === "Escape" && !overlay.hidden) closePlay(); });
    }
  </script>
</body>
</html>
